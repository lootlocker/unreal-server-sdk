<script type="text/javascript">
function llToggleDark() {
  var html = document.documentElement;
  var isDark = html.classList.contains('dark-mode') ||
               (!html.classList.contains('light-mode') &&
                window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches);
  if (isDark) {
    html.classList.remove('dark-mode');
    html.classList.add('light-mode');
    try { localStorage.setItem('ll-colorscheme', 'light'); } catch (e) {}
  } else {
    html.classList.remove('light-mode');
    html.classList.add('dark-mode');
    try { localStorage.setItem('ll-colorscheme', 'dark'); } catch (e) {}
  }
}
</script>
